<main class="canvas-page">
  <section class="canvas-card">
    <header class="canvas-header">
      <div class="brand-block">
        <img src="/github-canvas-avatar.jpg" alt="GitHub Canvas Avatar" class="brand-avatar" />
        <div>
          <h1>{{ headerTitle }}</h1>
          <p>{{ activeCount }} active pixels in {{ selectedYear }}</p>
        </div>
      </div>

      <div class="auth-block">
        <button
          *ngIf="!currentUser"
          type="button"
          class="sign-in-btn"
          [disabled]="showAuthSpinner"
          (click)="signIn()"
        >
          <span *ngIf="!showAuthSpinner">Sign In</span>
          <span *ngIf="showAuthSpinner" class="btn-spinner"></span>
        </button>

        <div *ngIf="currentUser" class="user-menu-wrap">
          <button
            type="button"
            class="user-pill"
            [disabled]="showAuthSpinner"
            (click)="toggleUserMenu($event)"
            [attr.aria-expanded]="showUserMenu"
            aria-haspopup="menu"
          >
            <img [src]="menuAvatarSrc" [alt]="menuAvatarAlt" class="user-pill-avatar" />
            <span *ngIf="showAuthSpinner" class="btn-spinner small"></span>
          </button>

          <div *ngIf="showUserMenu" class="user-dropdown" (click)="$event.stopPropagation()">
            <div class="user-dropdown-label">{{ currentUser.login }}</div>
            <button type="button" class="dropdown-item danger" (click)="logOut()">Log Out</button>
          </div>
        </div>
      </div>
    </header>

    <section class="left-panel">
      <section class="grid-shell" aria-label="Contribution canvas">
        <div class="month-track" aria-hidden="true">
          <span class="month-cell" *ngFor="let label of monthLabels; trackBy: trackByWeek">{{
            label
          }}</span>
        </div>

        <div class="grid-layout">
          <div class="day-track" aria-hidden="true">
            <span>Sun</span>
            <span>Mon</span>
            <span>Tue</span>
            <span>Wed</span>
            <span>Thu</span>
            <span>Fri</span>
            <span>Sat</span>
          </div>

          <div
            class="week-track"
            role="grid"
            [attr.aria-label]="'Contribution grid for ' + selectedYear"
          >
            <div class="week-column" *ngFor="let week of weeks; trackBy: trackByWeek">
              <button
                *ngFor="let cell of week; trackBy: trackByDay"
                type="button"
                class="pixel"
                [class.is-empty]="!cell.inYear"
                [class.is-active]="cell.active"
                [disabled]="!cell.inYear"
                (mousedown)="onCellMouseDown($event, cell)"
                (mouseenter)="onCellMouseEnter(cell)"
                (keydown.enter)="toggleCell(cell)"
                [attr.aria-label]="cell.iso + (cell.active ? ' active' : ' inactive')"
              ></button>
            </div>
          </div>
        </div>
      </section>

      <div class="clear-actions">
        <button
          *ngIf="!showClearConfirm"
          type="button"
          class="clear-btn"
          (click)="requestClearYear()"
        >
          Clear
        </button>

        <div *ngIf="showClearConfirm" class="clear-confirm">
          <span>Clear {{ selectedYear }}?</span>
          <div class="confirm-buttons">
            <button type="button" class="confirm-btn is-yes" (click)="confirmClearYear()">
              Yes
            </button>
            <button type="button" class="confirm-btn is-no" (click)="cancelClearYear()">No</button>
          </div>
        </div>
      </div>

      <div class="text-tools">
        <label for="text-preview">Type Text:</label>
        <div class="text-input-row">
          <input
            #textPreview
            id="text-preview"
            type="text"
            [value]="textInput"
            (input)="onTextInput(textPreview.value)"
            placeholder="CODING IS COOL!"
            spellcheck="false"
            autocomplete="off"
          />
          <button type="button" class="preview-btn" (click)="renderTextPreview()">Preview</button>
        </div>
        <p class="text-hint">A-Z, space, !, ? only · {{ textColumnsHint }}</p>
      </div>
    </section>

    <nav class="year-nav" aria-label="Select year">
      <button
        *ngFor="let year of years; trackBy: trackByWeek"
        type="button"
        class="year-btn"
        [class.is-selected]="isYearSelected(year)"
        (click)="selectYear(year)"
      >
        {{ year }}
      </button>
    </nav>
  </section>
</main>
