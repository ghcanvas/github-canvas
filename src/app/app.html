<main class="canvas-page">
  <section class="canvas-card">
    <header class="canvas-header">
      <div>
        <h1>GitHubCanvas.com</h1>
        <p>{{ activeCount }} active pixels in {{ selectedYear }}</p>
      </div>
    </header>

    <section class="canvas-body">
      <section class="grid-shell" aria-label="Contribution canvas">
        <div class="month-track" aria-hidden="true">
          <span class="month-cell" *ngFor="let label of monthLabels; trackBy: trackByWeek">{{
            label
          }}</span>
        </div>

        <div class="grid-layout">
          <div class="day-track" aria-hidden="true">
            <span>Sun</span>
            <span>Mon</span>
            <span>Tue</span>
            <span>Wed</span>
            <span>Thu</span>
            <span>Fri</span>
            <span>Sat</span>
          </div>

          <div
            class="week-track"
            role="grid"
            [attr.aria-label]="'Contribution grid for ' + selectedYear"
          >
            <div class="week-column" *ngFor="let week of weeks; trackBy: trackByWeek">
              <button
                *ngFor="let cell of week; trackBy: trackByDay"
                type="button"
                class="pixel"
                [class.is-empty]="!cell.inYear"
                [class.is-active]="cell.active"
                [disabled]="!cell.inYear"
                (mousedown)="onCellMouseDown($event, cell)"
                (mouseenter)="onCellMouseEnter(cell)"
                (keydown.enter)="toggleCell(cell)"
                [attr.aria-label]="cell.iso + (cell.active ? ' active' : ' inactive')"
              ></button>
            </div>
          </div>
        </div>
      </section>

      <nav class="year-nav" aria-label="Select year">
        <button
          *ngFor="let year of years; trackBy: trackByWeek"
          type="button"
          class="year-btn"
          [class.is-selected]="isYearSelected(year)"
          (click)="selectYear(year)"
        >
          {{ year }}
        </button>

        <div class="clear-actions">
          <button
            *ngIf="!showClearConfirm"
            type="button"
            class="clear-btn"
            (click)="requestClearYear()"
          >
            Clear
          </button>

          <div *ngIf="showClearConfirm" class="clear-confirm">
            <span>Clear {{ selectedYear }}?</span>
            <div class="confirm-buttons">
              <button type="button" class="confirm-btn is-yes" (click)="confirmClearYear()">
                Yes
              </button>
              <button type="button" class="confirm-btn is-no" (click)="cancelClearYear()">
                No
              </button>
            </div>
          </div>
        </div>
      </nav>
    </section>
  </section>
</main>
