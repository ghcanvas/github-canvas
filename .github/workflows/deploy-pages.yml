name: Deploy Angular to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      # IMPORTANT: base-href for project pages is /<repo-name>/
      - name: Build
        run: npm run build -- --base-href /

      # SPA fallback for GitHub Pages (fixes refresh/deep-link 404s)
      # This creates 404.html in the same folder as index.html at deploy time.
      - name: SPA fallback (404.html)
        run: cp dist/github-canvas/browser/index.html dist/github-canvas/browser/404.html

      # IMPORTANT: upload the folder that contains index.html
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/github-canvas/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
